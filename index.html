<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Undangan Bukber Pakar Corp</title>

<style>
html{scroll-behavior:smooth;}
body{
margin:0;
font-family:'Georgia', serif;
background:linear-gradient(180deg,#ffffff,#fff6e5,#fdecc8);
color:#b8860b;
overflow-x:hidden;
}

/* ================= COVER AMPL0P ================= */
#cover{
position:fixed;
inset:0;
background:linear-gradient(180deg,#6b3f1d,#b8860b);
display:flex;
justify-content:center;
align-items:center;
z-index:9999;
transition:1s ease;
}
#cover.hide{
opacity:0;
pointer-events:none;
}
.envelope{
background:#8b5a2b;
padding:42px 36px; /* DIKECILIN */
border-radius:18px;
box-shadow:0 30px 60px rgba(0,0,0,.45);
text-align:center;
color:#fff;
animation:float 4s ease-in-out infinite;
}
.envelope p{
letter-spacing:2px;
font-size:14px;
opacity:.85;
margin-bottom:6px; /* BARU */
}
.envelope h2{
margin:6px 0 14px; /* DIRAPETIN */
font-size:28px;
}
.envelope button{
background:#d4af37;
color:white;
border:none;
padding:12px 30px; /* DIKECILIN */
border-radius:30px;
font-weight:bold;
cursor:pointer;
}

/* ================= SECTION ================= */
section{
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
padding:3.5vw; /* DIKECILIN */
position:relative;
opacity:0;
transform:translateY(40px);
transition:1.2s ease;
}
section.show{
opacity:1;
transform:translateY(0);
}

/* FULL HEIGHT ONLY HERO & DETAIL */
.hero,#detail{min-height:100vh;}

h1{font-size:clamp(42px,7vw,80px); margin-bottom:6px;}
h2{font-size:clamp(26px,4.5vw,44px); margin-bottom:6px;}
p{font-size:clamp(15px,2.4vw,21px);margin:4px 0;} /* DIRAPETIN */

/* ================= BUTTON ================= */
button{
background:linear-gradient(45deg,#d4af37,#f5d76e);
color:white;
border:none;
padding:11px 30px; /* DIKECILIN */
border-radius:40px;
cursor:pointer;
font-weight:bold;
margin-top:12px; /* DIRAPETIN */
transition:.4s;
box-shadow:0 0 15px rgba(212,175,55,.45);
}

/* ================= HERO ================= */
.hero{
background:url('bg bukber.jpeg') center/cover no-repeat;
color:white;
position:relative;
}
.hero::after{
content:"";
position:absolute;
inset:0;
background:rgba(0,0,0,.55);
}
.hero *{position:relative;z-index:2;}

/* MOON */
.moon{
position:absolute;
top:8%; /* NAIK SEDIKIT */
right:8%;
width:70px;height:70px; /* DIKECILIN */
background:radial-gradient(circle at 30% 30%,#fff6c2,#d4af37);
border-radius:50%;
box-shadow:0 0 30px gold;
}
.moon::after{
content:"";
position:absolute;
left:22px;
width:70px;height:70px;
background:#000;
border-radius:50%;
}

/* ================= SAVE THE DATE ================= */
.save-date{
position:absolute;
top:4%; /* LEBIH DEKET */
left:50%;
transform:translateX(-50%) rotate(-3deg);
font-family:'Brush Script MT','Segoe Script',cursive;
font-size:clamp(46px,8vw,110px); /* SEDIKIT KECIL */
color:rgba(212,175,55,.32);
pointer-events:none;
}

/* ================= EVENT BOX GLASS ================= */
.event-box{
background:rgba(255,255,255,.28);
backdrop-filter:blur(12px);
border-radius:26px;
padding:22px 30px; /* DIRAPETIN */
margin-top:20px; /* DIRAPETIN */
border:1px solid rgba(255,255,255,.35);
box-shadow:0 20px 45px rgba(0,0,0,.12);
max-width:520px;
}
.event-box p{margin:4px 0;}
.dresscode{font-weight:bold;}

/* ================= MOSQUE ================= */
.mosque{
position:absolute;
bottom:-10px; /* NAIK */
left:0;
width:100%;
opacity:.06;
pointer-events:none;
}

/* ================= DIVIDER ================= */
.divider{
width:70px;
height:2px;
background:linear-gradient(90deg,transparent,#d4af37,transparent);
margin:10px auto 18px; /* DIRAPETIN */
}

/* ================= RSVP FIX JARAK ================= */
#rsvp{
padding-top:40px;
padding-bottom:40px;
}

/* ================= SPARKLE ================= */
.sparkle{
position:fixed;
width:6px;height:6px;
background:gold;
border-radius:50%;
animation:float 6s infinite ease-in-out;
opacity:.5;
}
@keyframes float{
0%{transform:translateY(0);}
50%{transform:translateY(-20px);}
100%{transform:translateY(0);}
}
</style>
</head>

<body>

<!-- ===== COVER ===== -->
<div id="cover">
  <div class="envelope">
    <p>Undangan Buka Puasa Bersama</p>
    <h2>PT Pakar Corp</h2>
    <button onclick="openInvitation()">Buka Undangan</button>
  </div>
</div>

<div class="sparkle" style="top:20%;left:10%;"></div>
<div class="sparkle" style="top:40%;left:80%;"></div>

<section class="hero">
  <div class="moon"></div>
  <h1>Ramadhan Kareem</h1>
  <p>Undangan Buka Puasa Bersama</p>
  <p><b>PT Pakar Corp Integrasi Utama</b></p>
  <button onclick="scrollToSection('detail')">Lihat Detail</button>
</section>

<section id="detail">
  <div class="save-date">Save The Date</div>
  <img class="mosque" src="https://upload.wikimedia.org/wikipedia/commons/thumb/5/5a/Mosque_silhouette.svg/1920px-Mosque_silhouette.svg.png">

  <div class="event-box">
    <h2>Jumat, 6 Maret 2026</h2>
    <p>17.00 WIB – Selesai</p>
    <p class="dresscode">Dresscode: Hitam & Coklat</p>
  </div>

  <button onclick="scrollToSection('lokasi')">Lihat Lokasi</button>
</section>

<section id="lokasi">
  <p style="letter-spacing:3px;opacity:.6;">Lokasi Acara</p>
  <h2>Omah Joglo Gendis</h2>
  <div class="divider"></div>
  <img src="omah.jpg" style="max-width:85%;border-radius:20px;">
  <a href="https://maps.google.com/?q=Omah+Joglo+Gendis+Bojongsari" target="_blank">
    <button>Lihat di Google Maps</button>
  </a>
</section>

<script>
function openInvitation(){
document.getElementById("cover").classList.add("hide");
document.querySelector(".hero").scrollIntoView({behavior:"smooth"});
const music=document.getElementById("bgm");
music.volume=0.6;
music.play();
}
function scrollToSection(id){
document.getElementById(id).scrollIntoView({behavior:"smooth"});
}
</script>

<audio id="bgm" loop>
  <source src="rahmatann.mp3" type="audio/mpeg">
</audio>

</body>
</html>
