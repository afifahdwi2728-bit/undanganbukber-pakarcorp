<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Undangan Bukber Pakar Corp</title>

<style>
body {
margin:0;
font-family: 'Georgia', serif;
background:#0d0d0d;
color:#d4af37;
scroll-behavior:smooth;
}

section{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
padding:20px;
}

h1,h2{margin:10px;}

button{
background:#d4af37;
color:black;
padding:12px 25px;
border:none;
border-radius:30px;
cursor:pointer;
font-weight:bold;
margin-top:20px;
}

img{
max-width:80%;
border-radius:15px;
margin-top:20px;
}

.countdown{
font-size:24px;
margin-top:15px;
}

.fade{
animation:fade 2s ease-in;
}

@keyframes fade{
from{opacity:0;}
to{opacity:1;}
}
</style>
</head>

<body>

<!-- SLIDE 1 -->
<section class="fade">
<h1>🌙 Ramadhan Kareem</h1>
<h2>Undangan Buka Puasa Bersama</h2>
<p>PT Pakar Corp Integrasi Utama</p>
<button onclick="document.getElementById('detail').scrollIntoView()">Buka Undangan</button>
</section>

<!-- SLIDE 2 -->
<section id="detail" class="fade">
<h2>Jumat, 6 Maret 2026</h2>
<p>17.00 WIB - Selesai</p>
<p>Dresscode: Hitam & Coklat</p>
<div class="countdown" id="countdown"></div>
<button onclick="document.getElementById('lokasi').scrollIntoView()">Lihat Lokasi</button>
</section>

<!-- SLIDE 3 -->
<section id="lokasi" class="fade">
<h2>Omah Joglo Gendis</h2>
<img src="https://source.unsplash.com/600x400/?joglo" alt="Omah Joglo">
<br>
<a href="https://maps.google.com/?q=Omah+Joglo+Gendis+Bojongsari" target="_blank">
<button>Lihat di Google Maps</button>
</a>
<button onclick="document.getElementById('rsvp').scrollIntoView()">RSVP</button>
</section>

<!-- SLIDE 4 -->
<section id="rsvp" class="fade">
<h2>Konfirmasi Kehadiran</h2>
<a href="https://wa.me/628XXXXXXXXXX?text=Halo,%20saya%20akan%20hadir%20di%20acara%20Bukber%20Pakar%20Corp" target="_blank">
<button>RSVP via WhatsApp</button>
</a>
</section>

<script>
var countDownDate = new Date("March 6, 2026 17:00:00").getTime();
var x = setInterval(function() {
var now = new Date().getTime();
var distance = countDownDate - now;
var days = Math.floor(distance / (1000 * 60 * 60 * 24));
var hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
var minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
var seconds = Math.floor((distance % (1000 * 60)) / 1000);
document.getElementById("countdown").innerHTML =
days + " Hari " + hours + " Jam " + minutes + " Menit " + seconds + " Detik ";
if (distance < 0) {
clearInterval(x);
document.getElementById("countdown").innerHTML = "Acara Dimulai";
}
}, 1000);
</script>

</body>
</html>
