<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Undangan Bukber Pakar Corp</title>

<style>
html{scroll-behavior:smooth;}
body{
margin:0;
font-family:'Georgia', serif;
background:linear-gradient(180deg,#ffffff,#fff6e5,#fdecc8);
color:#b8860b;
overflow-x:hidden;
}

/* COVER */
#cover{
position:fixed;
inset:0;
background:linear-gradient(180deg,#6b3f1d,#b8860b);
display:flex;
justify-content:center;
align-items:center;
z-index:9999;
transition:1s;
}
#cover.hide{opacity:0;pointer-events:none;}
.envelope{
background:#8b5a2b;
padding:42px 36px;
border-radius:18px;
box-shadow:0 30px 60px rgba(0,0,0,.45);
text-align:center;
color:#fff;
animation:float 4s ease-in-out infinite;
}
.envelope p{margin-bottom:6px;}
.envelope h2{margin:6px 0 14px;}
.envelope button{
background:#d4af37;
border:none;
padding:12px 30px;
border-radius:30px;
color:white;
font-weight:bold;
cursor:pointer;
}

/* SECTION */
section{
display:flex;
flex-direction:column;
align-items:center;
text-align:center;
padding:3.5vw;
opacity:0;
transform:translateY(40px);
transition:1s;
}
section.show{opacity:1;transform:none;}
.hero,#detail{min-height:100vh;}

h1{margin-bottom:6px;}
p{margin:4px 0;}

button{
margin-top:12px;
padding:11px 30px;
border-radius:40px;
border:none;
background:linear-gradient(45deg,#d4af37,#f5d76e);
color:white;
font-weight:bold;
cursor:pointer;
}

/* HERO */
.hero{
background:url('bg bukber.jpeg') center/cover no-repeat;
color:white;
position:relative;
}
.hero::after{
content:"";
position:absolute;
inset:0;
background:rgba(0,0,0,.55);
}
.hero *{position:relative;z-index:2;}

.moon{
position:absolute;
top:8%;
right:8%;
width:70px;height:70px;
background:radial-gradient(circle,#fff6c2,#d4af37);
border-radius:50%;
}

/* SAVE DATE */
.save-date{
position:absolute;
top:4%;
left:50%;
transform:translateX(-50%) rotate(-3deg);
font-family:'Brush Script MT',cursive;
font-size:clamp(46px,8vw,110px);
color:rgba(212,175,55,.32);
}

/* EVENT BOX */
.event-box{
background:rgba(255,255,255,.28);
backdrop-filter:blur(12px);
border-radius:26px;
padding:22px 30px;
margin-top:20px;
max-width:520px;
}

/* MOSQUE */
.mosque{
position:absolute;
bottom:-10px;
width:100%;
opacity:.06;
}

/* SPARKLE */
.sparkle{
position:fixed;
width:6px;height:6px;
background:gold;
border-radius:50%;
animation:float 6s infinite;
opacity:.5;
}
@keyframes float{
0%{transform:translateY(0);}
50%{transform:translateY(-20px);}
100%{transform:translateY(0);}
}
</style>
</head>

<body>

<div id="cover">
  <div class="envelope">
    <p>Undangan Buka Puasa Bersama</p>
    <h2>PT Pakar Corp</h2>
    <button onclick="openInvitation()">Buka Undangan</button>
  </div>
</div>

<div class="sparkle" style="top:20%;left:10%"></div>
<div class="sparkle" style="top:40%;left:80%"></div>

<section class="hero">
  <div class="moon"></div>
  <h1>Ramadhan Kareem</h1>
  <p>Undangan Buka Puasa Bersama</p>
  <p><b>PT Pakar Corp Integrasi Utama</b></p>
  <button onclick="scrollToSection('detail')">Lihat Detail</button>
</section>

<section id="detail">
  <div class="save-date">Save The Date</div>
  <img class="mosque" src="https://upload.wikimedia.org/wikipedia/commons/thumb/5/5a/Mosque_silhouette.svg/1920px-Mosque_silhouette.svg.png">

  <div class="event-box">
    <h2>Jumat, 6 Maret 2026</h2>
    <p>17.00 WIB – Selesai</p>
    <p><b>Dresscode:</b> Hitam & Coklat</p>
  </div>
</section>

<script>
function openInvitation(){
  document.getElementById("cover").classList.add("hide");
  document.querySelector(".hero").scrollIntoView({behavior:"smooth"});
  const music=document.getElementById("bgm");
  music.volume=0.6;
  music.play();
}

function scrollToSection(id){
  document.getElementById(id).scrollIntoView({behavior:"smooth"});
}

document.querySelectorAll("section").forEach(sec=>{
  window.addEventListener("scroll",()=>{
    if(sec.getBoundingClientRect().top < window.innerHeight - 120){
      sec.classList.add("show");
    }
  });
});
</script>

<audio id="bgm" loop>
  <source src="rahmatann.mp3" type="audio/mpeg">
</audio>

</body>
</html>
