<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Undangan Bukber Pakar Corp</title>

<style>
body {
    margin:0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(to bottom, #0f0f0f, #2c1b0f);
    color: #f5f5f5;
    text-align:center;
    overflow-x:hidden;
}

.container {
    padding:60px 20px;
    animation: fadeIn 2s ease-in-out;
}

.logo {
    width:120px;
    margin-bottom:20px;
}

h1 {
    font-size:40px;
    margin:10px 0;
    color:#d4af37;
}

h2 {
    font-weight:300;
    letter-spacing:3px;
    margin-bottom:30px;
}

.card {
    background: rgba(255,255,255,0.05);
    padding:30px;
    border-radius:15px;
    max-width:500px;
    margin:0 auto;
    backdrop-filter: blur(8px);
}

.countdown {
    font-size:22px;
    margin:20px 0;
    color:#d4af37;
}

.button {
    display:inline-block;
    padding:12px 25px;
    background:#6b4226;
    color:white;
    text-decoration:none;
    border-radius:30px;
    margin-top:20px;
    transition:0.3s;
}

.button:hover {
    background:#8b5e3c;
}

.moon {
    font-size:60px;
    margin-bottom:10px;
    animation: float 3s ease-in-out infinite;
}

.mosque {
    position:fixed;
    bottom:0;
    width:100%;
    opacity:0.1;
}

@keyframes fadeIn {
    from {opacity:0;}
    to {opacity:1;}
}

@keyframes float {
    0% {transform: translateY(0);}
    50% {transform: translateY(-10px);}
    100% {transform: translateY(0);}
}
</style>
</head>

<body>

<!-- Musik -->
<audio autoplay loop controls style="position:fixed; bottom:10px; right:10px;">
  <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mp3">
</audio>

<img src="LOGO-LINK-KAMU.png" class="logo">

<div class="container">

<div class="moon">🌙</div>

<h1>Ramadhan Kareem</h1>
<h2>Buka Puasa Bersama Pakar Corp</h2>

<div class="card">
<p><b>Jumat, 6 Maret 2026</b></p>
<p>Omah Joglo Gendis, Bojongsari</p>

<div class="countdown" id="countdown"></div>

<p><b>Dresscode:</b> Hitam & Coklat</p>

<a class="button" 
href="https://wa.me/628XXXXXXXXXX?text=Assalamualaikum,%20saya%20akan%20hadir%20di%20Bukber%20Pakar%20Corp"
target="_blank">
RSVP via WhatsApp
</a>

</div>
</div>

<img src="https://i.ibb.co/7V4L1vS/mosque-silhouette.png" class="mosque">

<script>
var countDownDate = new Date("Mar 6, 2026 17:30:00").getTime();

var x = setInterval(function() {

  var now = new Date().getTime();
  var distance = countDownDate - now;

  var days = Math.floor(distance / (1000 * 60 * 60 * 24));
  var hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
  var minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));

  document.getElementById("countdown").innerHTML =
  days + " Hari " + hours + " Jam " + minutes + " Menit";

  if (distance < 0) {
    clearInterval(x);
    document.getElementById("countdown").innerHTML = "Acara Sedang Berlangsung";
  }
}, 1000);
</script>

</body>
</html>
